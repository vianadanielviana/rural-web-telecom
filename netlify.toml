# ============================================
# RURAL WEB TELECOM - NETLIFY CONFIG
# ============================================

[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# SPA Redirect
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Otimizações de Build
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# Contextos por branch
[context.production]
  command = "npm run build"

[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"
